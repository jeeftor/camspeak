repos:
  # Enforce conventional commit message format
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  # Standard file hygiene hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: detect-private-key

  # Go linter — runs on all files (use golangci-lint for changed-only in local)
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.12.2
    hooks:
      - id: golangci-lint-full
      - id: golangci-lint-fmt

  # Go line shortener
  - repo: https://github.com/segmentio/golines
    rev: v0.12.2
    hooks:
      - id: golines
        args: ["-m", "100", "-t", "2"]

  # Secret detection — prevents credentials from being committed again
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks

  # Go tests — run on pre-push to keep commits fast
  - repo: local
    hooks:
      - id: gotest
        name: go test
        entry: gotestsum --format testdox ./...
        language: system
        types: [go]
        pass_filenames: false
        stages: [pre-push]
