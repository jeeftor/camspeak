name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/jeeftor/camspeak

jobs:
  # Fast job: vet + test (runs in parallel with Docker build)
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          cache: frontend

      - name: Build frontend
        run: cd frontend && bun install --frozen-lockfile && bun run build
        env:
          NODE_OPTIONS: --no-deprecation

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  # Docker build + push (runs in parallel with test job)
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    # Only push on master pushes (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
