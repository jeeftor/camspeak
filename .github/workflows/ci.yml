name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Cache bun
        uses: actions/cache@v5
        with:
          path: frontend/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}

      - name: Build frontend
        run: cd frontend && bun install --frozen-lockfile && bun run build
        env:
          NODE_OPTIONS: --no-deprecation

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...
